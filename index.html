<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>带娃出行指南</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAF7;--bg2:#F2F1EC;--bg3:#E8E6DF;
  --card:#fff;--border:#E0DDD4;--border2:#CBC8BE;
  --text:#1A1916;--text2:#6B6860;--text3:#A09D96;
  --green:#2A7A5A;--green-bg:#EBF5EF;--green-t:#1A5C3E;
  --blue:#2563A8;--blue-bg:#EBF2FB;--blue-t:#1A4A8A;
  --amber:#B85C00;--amber-bg:#FEF3E2;--amber-t:#8A4200;
  --purple:#6B3FA0;--purple-bg:#F3EEFB;--purple-t:#4A2878;
  --red:#B83232;--red-bg:#FDEAEA;--red-t:#8A2020;
  --teal:#1A7A6E;--teal-bg:#E8F5F3;--teal-t:#115A52;
  --gray-t:#4A4844;
}
html,body{height:100%;font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

header{height:54px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:100;position:relative;}
.logo{font-size:16px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:8px;}
.logo-dot{width:26px;height:26px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;}
.city-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1;}
.city-row::-webkit-scrollbar{display:none;}
.cbtn{padding:5px 14px;border-radius:999px;border:1px solid var(--border2);font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;background:transparent;transition:all .15s;}
.cbtn:hover{border-color:var(--green);color:var(--green);}
.cbtn.active{background:var(--green);color:#fff;border-color:var(--green);}

.app{display:flex;height:calc(100vh - 54px);}
.sidebar{width:290px;min-width:290px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.shead{padding:12px 14px 10px;border-bottom:1px solid var(--border);}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.chip{padding:3px 11px;border-radius:999px;border:1px solid var(--border);font-size:11px;color:var(--text2);cursor:pointer;background:transparent;transition:all .12s;}
.cnt{font-size:11px;color:var(--text3);}
.lst{flex:1;overflow-y:auto;}
.itm{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;flex-direction:column;gap:3px;}
.itm:hover{background:var(--bg);}
.itm.sel{background:var(--green-bg);}
.itop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.iname{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}
.imeta{font-size:11px;color:var(--text3);line-height:1.4;}
.tag{font-size:10px;padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;font-weight:500;}

.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.lgd{position:absolute;bottom:24px;right:12px;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 13px;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.lr{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* loading */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.pu{min-width:160px;font-family:'PingFang SC',sans-serif;}
.pu-name{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:2px;}
.pu-cat{font-size:11px;color:#999;margin-bottom:4px;}
.pu-meta{font-size:11px;color:#888;margin-bottom:6px;line-height:1.5;}
.pu-note{font-size:12px;color:#555;margin-bottom:6px;line-height:1.5;}
.pu-nav{display:inline-block;font-size:11px;color:#fff;background:#2A7A5A;padding:4px 12px;border-radius:6px;text-decoration:none;}

@media(max-width:640px){
  .app{flex-direction:column;}
  .sidebar{width:100%;min-width:unset;height:44vh;border-right:none;border-bottom:1px solid var(--border);}
  .map-wrap{flex:1;min-height:160px;}
}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot">娃</div>带娃出行指南</div>
  <div class="city-row" id="cr"></div>
</header>
<div class="app">
  <div class="sidebar">
    <div class="shead">
      <div class="chips" id="chips"></div>
      <div class="cnt" id="cnt"></div>
    </div>
    <div class="lst" id="lst">
      <div class="loading"><div class="spinner"></div><span>加载中...</span></div>
    </div>
  </div>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="lgd" id="lgd"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 配置 ──────────────────────────────────────────────
// Google Sheets ID
const SHEET_ID = '1tBAAD10BIABfcK3CsH0BQsxCZTCH8QJuShvMCzIG3ls';

// 城市配置：name = Sheet tab名，center/zoom = 地图初始位置
const CITY_CONFIG = [
  { name:'北京', gid:'0',        center:[39.95,116.38], zoom:11 },
  { name:'青岛', gid:'1182038936', center:[36.09,120.38], zoom:11 },
  // 加新城市：复制上面一行，改名字、gid（从sheet链接里找）、center、zoom
];

// 分类颜色配置
const CM = {
  '室外游乐园':{c:'#2A7A5A',bg:'#EBF5EF',tc:'#1A5C3E',lb:'室外'},
  '室内游乐园':{c:'#2563A8',bg:'#EBF2FB',tc:'#1A4A8A',lb:'室内'},
  '吃饭':      {c:'#B85C00',bg:'#FEF3E2',tc:'#8A4200',lb:'餐厅'},
  '博物馆':    {c:'#6B3FA0',bg:'#F3EEFB',tc:'#4A2878',lb:'博物馆'},
  '书店':      {c:'#1A7A6E',bg:'#E8F5F3',tc:'#115A52',lb:'书店'},
  '动物园':    {c:'#B83232',bg:'#FDEAEA',tc:'#8A2020',lb:'动物园'},
  '商场':      {c:'#888',   bg:'#E8E6DF',tc:'#4A4844',lb:'商场'},
  '儿童剧':    {c:'#C2399A',bg:'#FCE8F5',tc:'#8A1A6E',lb:'儿童剧'},
};
function cm(cat){return CM[cat]||{c:'#888',bg:'#eee',tc:'#444',lb:cat};}

// ── 状态 ──────────────────────────────────────────────
const DB = {}; // { 城市名: [{name,cat,lat,lng,note,age,link}, ...] }
let city = CITY_CONFIG[0].name;
let filt = '全部';
let sel  = null;
let mks  = [];

// ── 地图 ──────────────────────────────────────────────
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:19
}).addTo(map);

function mkIcon(cat){
  const c=cm(cat).c;
  return L.divIcon({className:'',
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${c};border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>`,
    iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});
}

// ── CSV 解析 ──────────────────────────────────────────
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    // 处理带引号的字段
    const cols = [];
    let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur);cur='';}
      else{cur+=line[i];}
    }
    cols.push(cur);
    const obj={};
    headers.forEach((h,i)=>obj[h]=(cols[i]||'').trim());
    return obj;
  }).filter(r=>r['名字']||r['name']);
}

function csvRowToPlace(row){
  const name = row['名字']||row['name']||'';
  const cat  = row['分类']||row['category']||'';
  const lat  = parseFloat(row['纬度']||row['lat']||0);
  const lng  = parseFloat(row['经度']||row['lng']||0);
  const note = row['note']||row['备注']||'';
  const age  = row['年龄段']||row['age']||'';
  const link = row['link']||'';
  if(!name||!lat||!lng) return null;
  return {name,cat,lat,lng,note,age,link};
}

// ── 数据加载 ──────────────────────────────────────────
async function loadCity(cfg){
  if(DB[cfg.name]) return; // 已缓存
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${cfg.gid}`;
  try{
    const res = await fetch(url);
    const text = await res.text();
    const rows = parseCSV(text);
    DB[cfg.name] = rows.map(csvRowToPlace).filter(Boolean);
  }catch(e){
    console.error('加载失败',cfg.name,e);
    DB[cfg.name] = [];
  }
}

// ── 渲染 ──────────────────────────────────────────────
function fp(){
  return (DB[city]||[])
    .map((p,i)=>({...p,oi:i}))
    .filter(p=>filt==='全部'||p.cat===filt);
}
function ucats(){return[...new Set((DB[city]||[]).map(p=>p.cat))].filter(Boolean);}

function rCities(){
  document.getElementById('cr').innerHTML=
    CITY_CONFIG.map(c=>`<button class="cbtn${c.name===city?' active':''}" onclick="swCity('${c.name}')">${c.name}</button>`).join('');
}
function rChips(){
  const cs=ucats();
  const allOn=filt==='全部';
  let h=`<button class="chip" style="${allOn?`background:var(--green);color:#fff;border-color:var(--green)`:''}" onclick="setF('全部')">全部</button>`;
  h+=cs.map(c=>{const m=cm(c),on=filt===c;
    return `<button class="chip" style="${on?`background:${m.bg};color:${m.tc};border-color:${m.c}`:''}" onclick="setF('${c}')">${m.lb}</button>`;
  }).join('');
  document.getElementById('chips').innerHTML=h;
}
function rLegend(){
  document.getElementById('lgd').innerHTML=ucats().map(c=>{
    const m=cm(c);return `<div class="lr"><div class="ld" style="background:${m.c}"></div>${m.lb}</div>`;}).join('');
}
function rMarkers(){
  mks.forEach(m=>m.m.remove());mks=[];
  fp().forEach(p=>{
    const mk=L.marker([p.lat,p.lng],{icon:mkIcon(p.cat)}).addTo(map);
    let metaHtml='';
    if(p.age) metaHtml+=`适合 ${p.age}　`;
    const navUrl=p.link||`https://maps.google.com/?q=${p.lat},${p.lng}`;
    mk.bindPopup(`<div class="pu">
      <div class="pu-name">${p.name}</div>
      <div class="pu-cat">${p.cat}</div>
      ${metaHtml?`<div class="pu-meta">${metaHtml}</div>`:''}
      ${p.note?`<div class="pu-note">${p.note}</div>`:''}
      <a class="pu-nav" href="${navUrl}" target="_blank">导航前往 →</a>
    </div>`,{maxWidth:220});
    mk.on('click',()=>pick(p.oi));
    mks.push({m:mk,oi:p.oi});
  });
}
function rList(){
  const f=fp();
  document.getElementById('cnt').textContent=`共 ${f.length} 个地点`;
  document.getElementById('lst').innerHTML=f.length===0
    ? `<div class="loading"><span>暂无数据</span></div>`
    : f.map((p,fi)=>{
        const m=cm(p.cat),isSel=p.oi===sel;
        const meta=[p.age].filter(Boolean).join(' · ');
        return `<div class="itm${isSel?' sel':''}" onclick="pick(${p.oi})" data-fi="${fi}">
          <div class="itop"><span class="iname">${p.name}</span>
          <span class="tag" style="background:${m.bg};color:${m.tc}">${m.lb}</span></div>
          ${meta?`<div class="imeta">${meta}</div>`:''}
        </div>`;
      }).join('');
}

function pick(oi){
  sel=oi;
  const p=(DB[city]||[])[oi];if(!p)return;
  map.setView([p.lat,p.lng],15,{animate:true});
  const mk=mks.find(m=>m.oi===oi);if(mk)mk.m.openPopup();
  rList();
  const f=fp(),fi=f.findIndex(p=>p.oi===oi);
  const items=document.querySelectorAll('.itm');
  if(fi>=0&&items[fi])items[fi].scrollIntoView({behavior:'smooth',block:'nearest'});
}
function setF(f){filt=f;sel=null;rChips();rMarkers();rList();}

async function swCity(c){
  city=c;filt='全部';sel=null;
  rCities();
  document.getElementById('lst').innerHTML='<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
  const cfg=CITY_CONFIG.find(x=>x.name===c);
  map.setView(cfg.center,cfg.zoom,{animate:true});
  await loadCity(cfg);
  rChips();rLegend();rMarkers();rList();
}

// ── 启动 ──────────────────────────────────────────────
async function init(){
  const cfg=CITY_CONFIG[0];
  map.setView(cfg.center,cfg.zoom);
  rCities();
  await loadCity(cfg);
  rChips();rLegend();rMarkers();rList();
}
init();
</script>
</body>
</html>
