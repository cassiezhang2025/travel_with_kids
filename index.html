<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>带娃出行指南 · Kids Travel Guide</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FAFAF7;--bg2:#F2F1EC;--bg3:#E8E6DF;
  --card:#fff;--border:#E0DDD4;--border2:#CBC8BE;
  --text:#1A1916;--text2:#6B6860;--text3:#A09D96;
  --green:#2A7A5A;--green-bg:#EBF5EF;--green-t:#1A5C3E;
  --blue:#2563A8;--blue-bg:#EBF2FB;--blue-t:#1A4A8A;
  --amber:#B85C00;--amber-bg:#FEF3E2;--amber-t:#8A4200;
  --purple:#6B3FA0;--purple-bg:#F3EEFB;--purple-t:#4A2878;
  --red:#B83232;--red-bg:#FDEAEA;--red-t:#8A2020;
  --teal:#1A7A6E;--teal-bg:#E8F5F3;--teal-t:#115A52;
  --gray-t:#4A4844;
}
html,body{height:100%;font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}

header{height:54px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;z-index:100;position:relative;}
.logo{font-size:15px;font-weight:600;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.logo-dot{width:26px;height:26px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0;}
.city-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex:1;}
.city-row::-webkit-scrollbar{display:none;}
.cbtn{padding:5px 14px;border-radius:999px;border:1px solid var(--border2);font-size:13px;color:var(--text2);cursor:pointer;white-space:nowrap;background:transparent;transition:all .15s;}
.cbtn:hover{border-color:var(--green);color:var(--green);}
.cbtn.active{background:var(--green);color:#fff;border-color:var(--green);}

/* 语言切换按钮 */
.lang-btn{
  padding:5px 12px;border-radius:999px;
  border:1px solid var(--border2);
  font-size:12px;color:var(--text2);
  cursor:pointer;white-space:nowrap;
  background:transparent;flex-shrink:0;
  transition:all .15s;font-weight:500;
}
.lang-btn:hover{border-color:var(--green);color:var(--green);}

.app{display:flex;height:calc(100vh - 54px);}
.sidebar{width:290px;min-width:290px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.shead{padding:12px 14px 10px;border-bottom:1px solid var(--border);}
.chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;}
.chip{padding:3px 11px;border-radius:999px;border:1px solid var(--border);font-size:11px;color:var(--text2);cursor:pointer;background:transparent;transition:all .12s;}
.cnt{font-size:11px;color:var(--text3);}
.lst{flex:1;overflow-y:auto;}
.itm{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;display:flex;flex-direction:column;gap:3px;}
.itm:hover{background:var(--bg);}
.itm.sel{background:var(--green-bg);}
.itop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.iname{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}
.imeta{font-size:11px;color:var(--text3);line-height:1.4;}
.tag{font-size:10px;padding:2px 8px;border-radius:999px;white-space:nowrap;flex-shrink:0;font-weight:500;}

.map-wrap{flex:1;position:relative;}
#map{width:100%;height:100%;}
.lgd{position:absolute;bottom:24px;right:12px;z-index:999;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 13px;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.lr{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2);}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:var(--text3);}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.pu{min-width:160px;font-family:'PingFang SC',sans-serif;}
.pu-name{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:2px;}
.pu-cat{font-size:11px;color:#999;margin-bottom:4px;}
.pu-meta{font-size:11px;color:#888;margin-bottom:6px;line-height:1.5;}
.pu-note{font-size:12px;color:#555;margin-bottom:6px;line-height:1.5;}
.pu-nav{display:inline-block;font-size:11px;color:#fff;background:#2A7A5A;padding:4px 12px;border-radius:6px;text-decoration:none;}

@media(max-width:640px){
  .app{flex-direction:column;}
  .sidebar{width:100%;min-width:unset;height:44vh;border-right:none;border-bottom:1px solid var(--border);}
  .map-wrap{flex:1;min-height:160px;}
  .logo span{display:none;}
}
</style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot">娃</div><span id="logo-text">带娃出行指南</span></div>
  <div class="city-row" id="cr"></div>
  <button class="lang-btn" id="langBtn" onclick="toggleLang()">English</button>
</header>
<div class="app">
  <div class="sidebar">
    <div class="shead">
      <div class="chips" id="chips"></div>
      <div class="cnt" id="cnt"></div>
    </div>
    <div class="lst" id="lst">
      <div class="loading"><div class="spinner"></div><span id="loading-text">加载中...</span></div>
    </div>
  </div>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="lgd" id="lgd"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 配置 ──────────────────────────────────────────────
const SHEET_ID = '1tBAAD10BIABfcK3CsH0BQsxCZTCH8QJuShvMCzIG3ls';

const CITY_CONFIG = [
  { name:'北京', name_en:'Beijing', gid:'0',           center:[39.95,116.38], zoom:11 },
  { name:'青岛', name_en:'Qingdao', gid:'1182038936',  center:[36.09,120.38], zoom:11 },
  // 加新城市：{ name:'城市', name_en:'City', gid:'xxx', center:[lat,lng], zoom:11 }
];

// 分类中英文配置
const CM = {
  '室外游乐园':{c:'#2A7A5A',bg:'#EBF5EF',tc:'#1A5C3E',lb:'室外',  lb_en:'Outdoor'},
  '室内游乐园':{c:'#2563A8',bg:'#EBF2FB',tc:'#1A4A8A',lb:'室内',  lb_en:'Indoor'},
  '吃饭':      {c:'#B85C00',bg:'#FEF3E2',tc:'#8A4200',lb:'餐厅',  lb_en:'Food'},
  '博物馆':    {c:'#6B3FA0',bg:'#F3EEFB',tc:'#4A2878',lb:'博物馆',lb_en:'Museum'},
  '书店':      {c:'#1A7A6E',bg:'#E8F5F3',tc:'#115A52',lb:'书店',  lb_en:'Bookstore'},
  '动物园':    {c:'#B83232',bg:'#FDEAEA',tc:'#8A2020',lb:'动物园',lb_en:'Zoo'},
  '商场':      {c:'#888',   bg:'#E8E6DF',tc:'#4A4844',lb:'商场',  lb_en:'Mall'},
  '儿童剧':    {c:'#C2399A',bg:'#FCE8F5',tc:'#8A1A6E',lb:'儿童剧',lb_en:'Theater'},
  '主题公园':  {c:'#D4760A',bg:'#FEF0DC',tc:'#8A4A00',lb:'主题公园',lb_en:'Theme Park'},
  '海滩':      {c:'#0A8AB8',bg:'#E0F3FC',tc:'#085A7A',lb:'海滩',  lb_en:'Beach'},
};
function cm(cat){return CM[cat]||{c:'#888',bg:'#eee',tc:'#444',lb:cat,lb_en:cat};}

// ── 双语文案 ──────────────────────────────────────────
const I18N = {
  zh:{
    logo:'带娃出行指南', loading:'加载中...', all:'全部',
    count: n=>`共 ${n} 个地点`, empty:'暂无数据',
    nav:'导航前往 →', suitable:'适合',
  },
  en:{
    logo:"Kids Travel Guide", loading:'Loading...', all:'All',
    count: n=>`${n} places`, empty:'No results',
    nav:'Get Directions →', suitable:'Ages',
  }
};

// ── 状态 ──────────────────────────────────────────────
const DB = {};
let city = CITY_CONFIG[0].name;
let filt = '全部';
let sel  = null;
let mks  = [];
let lang = 'zh'; // 'zh' | 'en'

function t(key){ return I18N[lang][key]; }
function catLabel(cat){ return lang==='zh' ? cm(cat).lb : cm(cat).lb_en; }

// ── 语言切换 ──────────────────────────────────────────
function toggleLang(){
  lang = lang==='zh' ? 'en' : 'zh';
  document.getElementById('langBtn').textContent = lang==='zh' ? 'English' : '中文';
  document.getElementById('logo-text').textContent = t('logo');
  document.documentElement.lang = lang==='zh'?'zh-CN':'en';
  rCities(); rChips(); rLegend(); rMarkers(); rList();
}

// ── 地图 ──────────────────────────────────────────────
const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© OpenStreetMap',maxZoom:19
}).addTo(map);

function mkIcon(cat){
  const c=cm(cat).c;
  return L.divIcon({className:'',
    html:`<div style="width:12px;height:12px;border-radius:50%;background:${c};border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>`,
    iconSize:[12,12],iconAnchor:[6,6],popupAnchor:[0,-8]});
}

// ── CSV 解析 ──────────────────────────────────────────
function parseCSV(text){
  const lines = text.trim().split('\n');
  if(lines.length < 2) return [];
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line=>{
    const cols=[];let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){cols.push(cur);cur='';}
      else{cur+=line[i];}
    }
    cols.push(cur);
    const obj={};
    headers.forEach((h,i)=>obj[h]=(cols[i]||'').trim());
    return obj;
  }).filter(r=>r['名字']||r['name']);
}

function csvRowToPlace(row){
  const name    = row['名字']||row['name']||'';
  const name_en = row['name_en']||'';
  const cat     = row['分类']||row['category']||'';
  const lat     = parseFloat(row['纬度']||row['lat']||0);
  const lng     = parseFloat(row['经度']||row['lng']||0);
  const note    = row['note']||row['备注']||'';
  const note_en = row['note_en']||'';
  const age     = row['年龄段']||row['age']||'';
  const link    = row['link']||'';
  if(!name||!lat||!lng) return null;
  return {name,name_en,cat,lat,lng,note,note_en,age,link};
}

// ── 数据加载 ──────────────────────────────────────────
async function loadCity(cfg){
  if(DB[cfg.name]) return;
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${cfg.gid}`;
  try{
    const res=await fetch(url);
    const text=await res.text();
    DB[cfg.name]=parseCSV(text).map(csvRowToPlace).filter(Boolean);
  }catch(e){
    console.error('load failed',cfg.name,e);
    DB[cfg.name]=[];
  }
}

// ── 渲染 ──────────────────────────────────────────────
function fp(){
  return (DB[city]||[]).map((p,i)=>({...p,oi:i}))
    .filter(p=>filt==='全部'||filt==='All'||p.cat===filt);
}
function ucats(){return[...new Set((DB[city]||[]).map(p=>p.cat))].filter(Boolean);}

function pName(p){ return (lang==='en'&&p.name_en) ? p.name_en : p.name; }
function pNote(p){ return (lang==='en'&&p.note_en) ? p.note_en : p.note; }

function rCities(){
  document.getElementById('cr').innerHTML=
    CITY_CONFIG.map(c=>{
      const label = lang==='en' ? c.name_en : c.name;
      return `<button class="cbtn${c.name===city?' active':''}" onclick="swCity('${c.name}')">${label}</button>`;
    }).join('');
}
function rChips(){
  const cs=ucats();
  const allOn=filt==='全部'||filt==='All';
  const allLabel=t('all');
  let h=`<button class="chip" style="${allOn?`background:var(--green);color:#fff;border-color:var(--green)`:''}" onclick="setF('${allLabel}')">${allLabel}</button>`;
  h+=cs.map(c=>{const m=cm(c),on=filt===c;
    return `<button class="chip" style="${on?`background:${m.bg};color:${m.tc};border-color:${m.c}`:''}" onclick="setF('${c}')">${catLabel(c)}</button>`;
  }).join('');
  document.getElementById('chips').innerHTML=h;
}
function rLegend(){
  document.getElementById('lgd').innerHTML=ucats().map(c=>{
    const m=cm(c);
    return `<div class="lr"><div class="ld" style="background:${m.c}"></div>${catLabel(c)}</div>`;
  }).join('');
}
function rMarkers(){
  mks.forEach(m=>m.m.remove());mks=[];
  fp().forEach(p=>{
    const mk=L.marker([p.lat,p.lng],{icon:mkIcon(p.cat)}).addTo(map);
    const navUrl=p.link||`https://maps.google.com/?q=${p.lat},${p.lng}`;
    const ageLine=p.age?`<div class="pu-meta">${t('suitable')}: ${p.age}</div>`:'';
    const noteLine=pNote(p)?`<div class="pu-note">${pNote(p)}</div>`:'';
    mk.bindPopup(`<div class="pu">
      <div class="pu-name">${pName(p)}</div>
      <div class="pu-cat">${catLabel(p.cat)}</div>
      ${ageLine}${noteLine}
      <a class="pu-nav" href="${navUrl}" target="_blank">${t('nav')}</a>
    </div>`,{maxWidth:220});
    mk.on('click',()=>pick(p.oi));
    mks.push({m:mk,oi:p.oi});
  });
}
function rList(){
  const f=fp();
  document.getElementById('cnt').textContent=t('count')(f.length);
  document.getElementById('lst').innerHTML=f.length===0
    ?`<div class="loading"><span>${t('empty')}</span></div>`
    :f.map((p,fi)=>{
      const m=cm(p.cat),isSel=p.oi===sel;
      return `<div class="itm${isSel?' sel':''}" onclick="pick(${p.oi})" data-fi="${fi}">
        <div class="itop"><span class="iname">${pName(p)}</span>
        <span class="tag" style="background:${m.bg};color:${m.tc}">${catLabel(p.cat)}</span></div>
        ${p.age?`<div class="imeta">${t('suitable')}: ${p.age}</div>`:''}
      </div>`;
    }).join('');
}

function pick(oi){
  sel=oi;
  const p=(DB[city]||[])[oi];if(!p)return;
  map.setView([p.lat,p.lng],15,{animate:true});
  const mk=mks.find(m=>m.oi===oi);if(mk)mk.m.openPopup();
  rList();
  const f=fp(),fi=f.findIndex(p=>p.oi===oi);
  const items=document.querySelectorAll('.itm');
  if(fi>=0&&items[fi])items[fi].scrollIntoView({behavior:'smooth',block:'nearest'});
}

function setF(f){
  filt=f==='All'||f==='全部' ? (lang==='zh'?'全部':'All') : f;
  sel=null;rChips();rMarkers();rList();
}

async function swCity(c){
  city=c;filt=lang==='zh'?'全部':'All';sel=null;
  rCities();
  document.getElementById('lst').innerHTML=`<div class="loading"><div class="spinner"></div><span>${t('loading')}</span></div>`;
  const cfg=CITY_CONFIG.find(x=>x.name===c);
  map.setView(cfg.center,cfg.zoom,{animate:true});
  await loadCity(cfg);
  rChips();rLegend();rMarkers();rList();
}

async function init(){
  const cfg=CITY_CONFIG[0];
  map.setView(cfg.center,cfg.zoom);
  rCities();
  await loadCity(cfg);
  rChips();rLegend();rMarkers();rList();
}
init();
</script>
</body>
</html>
